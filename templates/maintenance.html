<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Under Maintenance</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0c12;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        body::before {
            content: '';
            position: fixed;
            top: -100px; left: 50%; transform: translateX(-50%);
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(245,158,11,0.07) 0%, transparent 70%);
            pointer-events: none;
        }
        .card {
            background: #0f111a;
            border: 1px solid #1e2130;
            border-radius: 28px;
            padding: 48px 32px;
            max-width: 420px;
            width: 100%;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            animation: fadeUp 0.5s ease;
        }
        @keyframes fadeUp {
            from { opacity:0; transform:translateY(20px); }
            to { opacity:1; transform:translateY(0); }
        }
        .icon-wrap {
            width: 80px; height: 80px;
            background: linear-gradient(135deg, #f59e0b22, #f59e0b11);
            border: 2px solid #f59e0b44;
            border-radius: 24px;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 24px;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(245,158,11,0.2); }
            50% { box-shadow: 0 0 0 12px rgba(245,158,11,0); }
        }
        .icon-wrap i { font-size: 36px; color: #f59e0b; }
        h1 { font-size: 28px; font-weight: 800; color: #fff; margin-bottom: 8px; }
        .subtitle { font-size: 13px; color: #6b7280; margin-bottom: 24px; }
        .msg-box {
            background: #151821;
            border: 1px solid #f59e0b33;
            border-radius: 16px;
            padding: 16px 20px;
            font-size: 14px;
            color: #d1d5db;
            line-height: 1.6;
            margin-bottom: 28px;
        }
        .dots { display: flex; justify-content: center; gap: 8px; }
        .dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: #f59e0b;
            animation: bounce 1.4s infinite ease-in-out;
        }
        .dot:nth-child(1) { animation-delay: 0s; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
            40% { transform: scale(1); opacity: 1; }
        }
        .admin-link {
            display: inline-block;
            margin-top: 28px;
            font-size: 12px;
            color: #374151;
            text-decoration: none;
            padding: 6px 14px;
            border-radius: 8px;
            transition: color 0.2s;
        }
        .admin-link:hover { color: #6b7280; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon-wrap">
            <i class="fas fa-tools"></i>
        </div>
        <h1>Under Maintenance</h1>
        <p class="subtitle">FFGlory Panel</p>
        <div class="msg-box">
            {{ message }}
        </div>
        <div class="dots">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
        <a href="/admin" class="admin-link">Admin Login →</a>
    </div>
</body>
</html>
